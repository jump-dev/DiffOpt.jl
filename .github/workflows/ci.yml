name: CI
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
# needed to allow julia-actions/cache to delete old caches that it has created
permissions:
  actions: write
  contents: read
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: 'lts'
            os: ubuntu-latest
            arch: x64
          - version: '1'
            os: ubuntu-latest
            arch: x64
          - version: '1'
            os: windows-latest
            arch: x64
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          DATADEPS_ALWAYS_ACCEPT: true # For MLDatasets.MNIST
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v4
        with:
          file: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
  test-xpress:
    name: Xpress Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - name: Instantiate Xpress test environment
        run: julia --project=test/xpress -e 'using Pkg; Pkg.instantiate()'
      - name: Run Xpress tests
        run: julia --project=test/xpress test/xpress/runtests.jl
  test-gurobi:
    name: Gurobi Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - shell: bash
        run: echo "${{ secrets.GUROBI_LICENSE }}" > ~/gurobi.lic
      - uses: julia-actions/julia-buildpkg@v1
      - name: Instantiate Gurobi test environment
        run: julia --project=test/gurobi -e 'using Pkg; Pkg.instantiate()'
      - name: Run Gurobi tests
        run: julia --project=test/gurobi test/gurobi/runtests.jl
